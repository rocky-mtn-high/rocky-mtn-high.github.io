<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 40px;
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Passions</h1>
    </header>
    
    <section>
        <h2>Hobbies</h2>
        <ul>
            <li>Reading</li>
            <li>Hiking</li>
            <li>Photography</li>
        </ul>
    </section>
    
    <section>
        <h2>Interests</h2>
        <ul>
            <li>Technology</li>
            <li>Travel</li>
            <li>Music</li>
        </ul>
    </section>
</body>
</html>
